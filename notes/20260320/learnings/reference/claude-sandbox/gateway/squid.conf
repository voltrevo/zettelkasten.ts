# Claude Sandbox Gateway - Squid Forward Proxy
# Domain-based allowlist for sandboxed containers

# Listen on all interfaces, port 3128
http_port 3128

# Domain allowlist (loaded from external file for easy runtime updates)
acl allowed_domains dstdomain "/etc/squid/allowed_domains.txt"

# Standard port ACLs
acl SSL_ports port 443
acl Safe_ports port 80
acl Safe_ports port 443
acl CONNECT method CONNECT

# Deny non-standard ports
http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports

# Allow CONNECT (HTTPS) only to allowed domains
http_access allow CONNECT allowed_domains

# Allow HTTP only to allowed domains
http_access allow allowed_domains

# Deny everything else
http_access deny all

# Disable caching - keeps things simple, avoids stale packages
cache deny all

# Logging to files readable by proxy user (tailed to stdout by entrypoint)
access_log stdio:/var/log/squid/access.log
cache_log /var/log/squid/cache.log

# Don't advertise squid version
httpd_suppress_version_string on

# Reasonable timeouts
connect_timeout 30 seconds
read_timeout 300 seconds

# No disk cache
cache_dir ufs /tmp/squid 100 16 256

# Suppress "via" header to avoid leaking proxy info
via off
forwarded_for delete
