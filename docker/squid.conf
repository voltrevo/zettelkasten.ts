# Squid proxy — allowlist for agent internet access
acl localnet src 172.29.0.0/24
acl SSL_ports port 443
acl CONNECT method CONNECT
acl allowed_sites dstdomain .anthropic.com .claude.ai .claude.com
acl test_sites dstdomain example.com
acl apt_sites dstdomain .debian.org .ubuntu.com .launchpad.net .cloudfront.net
acl npm_sites dstdomain .npmjs.org .npmjs.com registry.npmjs.org
acl pypi_sites dstdomain pypi.org files.pythonhosted.org
acl deno_sites dstdomain deno.land jsr.io esm.sh .denoland.dev

# Allow HTTPS CONNECT to allowed sites
http_access allow CONNECT SSL_ports allowed_sites
http_access allow CONNECT SSL_ports test_sites
http_access allow CONNECT SSL_ports apt_sites
http_access allow CONNECT SSL_ports npm_sites
http_access allow CONNECT SSL_ports pypi_sites
http_access allow CONNECT SSL_ports deno_sites
http_access allow localnet allowed_sites
http_access allow localnet test_sites
http_access allow localnet apt_sites
http_access allow localnet npm_sites
http_access allow localnet pypi_sites
http_access allow localnet deno_sites
http_access deny all

http_port 3128

# Logging
access_log none
cache_log /var/log/squid/cache.log
